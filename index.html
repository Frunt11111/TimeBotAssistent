<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h1>📋 TimeBot</h1>
    
    <input type="text" id="taskName" placeholder="Название задачи" 
           style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box;">
    
    <input type="date" id="taskDate" 
           style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box;">
    
    <input type="time" id="taskTime" value="12:00" 
           style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box;">
    
    <button onclick="addTask()" 
            style="width:100%; padding:15px; background:#2481cc; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer;">
        ➕ Добавить задачу
    </button>

    <script>
        // Инициализация Telegram WebApp
        let tg = Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Устанавливаем сегодняшнюю дату в поле даты
        const today = new Date();
        document.getElementById('taskDate').value = today.toISOString().split('T')[0];

        function addTask() {
            const name = document.getElementById('taskName').value.trim();
            const date = document.getElementById('taskDate').value;
            const time = document.getElementById('taskTime').value;

            if (!name) {
                alert('Введите название задачи!');
                return;
            }

            // Собираем данные задачи (без лишних полей)
            const task = {
                name: name,
                date: date,
                time: time
            };

            console.log("📤 Отправляем задачу:", task);

            try {
                // Отправляем данные боту
                tg.sendData(JSON.stringify({
                    action: 'add',
                    task: task
                }));

                // Если дошли до сюда, значит отправка удалась
                alert('✅ Задача отправлена боту!');

                // Очищаем поле названия
                document.getElementById('taskName').value = '';

            } catch (e) {
                console.error('❌ Ошибка:', e);
                alert('Ошибка: ' + e.message);
            }
        }
    </script>
</body>
</html>

</html>
